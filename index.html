<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBI Scale II Study Portal</title>
    <style>
        :root {
            --primary: #4f6ef7;
            --primary-dark: #3a57d4;
            --primary-glow: rgba(79,110,247,0.22);
            --success: #22c55e;
            --success-bg: #f0fdf4;
            --success-border: #bbf7d0;
            --error: #ef4444;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
            --warning: #f59e0b;
            --skip-color: #8b5cf6;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.07),0 20px 50px -10px rgba(0,0,0,0.12);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --option-bg: #ffffff;
            --option-hover-bg: #f8faff;
            --hint-bg: #fffbeb;
            --hint-border: #fcd34d;
            --progress-bg: #e2e8f0;
            --progress-fill: linear-gradient(90deg,#4f6ef7,#7c3aed);
            --header-gradient: linear-gradient(135deg,#4f6ef7 0%,#7c3aed 100%);
            --toggle-bg: #e2e8f0;
            --transition: 0.22s ease;
        }
        [data-theme="dark"] {
            --primary: #6b8aff;
            --primary-glow: rgba(107,138,255,0.28);
            --success: #4ade80;
            --success-bg: #052e16;
            --success-border: #166534;
            --error: #f87171;
            --error-bg: #2d0d0d;
            --error-border: #7f1d1d;
            --warning: #fbbf24;
            --skip-color: #a78bfa;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.4),0 20px 50px -10px rgba(0,0,0,0.5);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --option-bg: #1e293b;
            --option-hover-bg: #263048;
            --hint-bg: #1c1a07;
            --hint-border: #854d0e;
            --progress-bg: #334155;
            --progress-fill: linear-gradient(90deg,#6b8aff,#a78bfa);
            --header-gradient: linear-gradient(135deg,#3b4fd4 0%,#6d28d9 100%);
            --toggle-bg: #4f6ef7;
        }

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 60px;transition:background var(--transition),color var(--transition);color:var(--text-primary)}
        .app-wrapper{width:100%;max-width:740px}

        /* TOP BAR */
        .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px}
        .app-brand{display:flex;align-items:center;gap:10px}
        .brand-icon{width:40px;height:40px;background:var(--header-gradient);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 4px 12px var(--primary-glow);flex-shrink:0}
        .brand-text{font-size:1.05rem;font-weight:800;color:var(--text-primary);line-height:1.2}
        .brand-sub{font-size:0.7rem;color:var(--text-muted);font-weight:400}
        .top-controls{display:flex;align-items:center;gap:8px}

        /* ICON BUTTONS */
