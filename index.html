<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBI Scale II - Prod Support Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f9; color: #333; display: flex; justify-content: center; padding: 20px; }
        .quiz-container { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; color: #004a99; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #question-text { font-size: 1.1rem; margin-bottom: 20px; font-weight: 600; line-height: 1.4; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; transition: 0.2s; }
        .option-btn:hover { background: #eef6ff; border-color: #004a99; }
        #hint-box { display: none; background: #fff8e1; border-left: 4px solid #ffc107; padding: 10px; margin-top: 15px; font-size: 0.9rem; }
        #feedback { margin-top: 15px; font-weight: 600; }
        .next-btn { display: none; width: 100%; padding: 12px; background: #004a99; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-app">
    <h1>CBI Scale II Prep</h1>
    <div id="quiz-content">
        <p id="question-text">Loading questions...</p>
        <div id="options-container"></div>
        <div id="hint-box"></div>
        <div id="feedback"></div>
        <button class="next-btn" id="next-button" onclick="loadNextQuestion()">Next Question ➜</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
