<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBI Scale II Study Portal</title>
    <style>
        :root { --primary: #004a99; --success: #2e7d32; --error: #d32f2f; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-container { background: white; width: 100%; max-width: 650px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 15px; }
        #status { font-weight: 600; color: var(--primary); font-size: 0.9rem; }
        .app-title { font-weight: bold; font-size: 1.2rem; color: #444; }

        #question-text { font-size: 1.25rem; font-weight: 600; line-height: 1.5; margin-bottom: 20px; color: #222; }
        
        .option-btn { display: block; width: 100%; padding: 15px; margin: 12px 0; border: 1.5px solid #dfe3e8; border-radius: 10px; cursor: pointer; text-align: left; background: white; font-size: 1rem; transition: all 0.2s; }
        .option-btn:hover:not(:disabled) { background: #f8faff; border-color: var(--primary); transform: translateY(-1px); }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }

        #feedback-box { padding: 15px; border-radius: 10px; margin-top: 20px; display: none; line-height: 1.5; font-size: 0.95rem; border: 1px solid transparent; }
        .feedback-correct { background: #e8f5e9; border-color: #c8e6c9; color: var(--success); }
        .feedback-wrong { background: #ffebee; border-color: #ffcdd2; color: var(--error); }

        #hint-box { padding: 15px; background: #fffde7; border-left: 5px solid #fbc02d; margin-top: 15px; display: none; border-radius: 5px; font-style: italic; color: #555; }
        
        .controls { display: flex; gap: 15px; margin-top: 25px; }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 1rem; transition: 0.2s; }
        .hint-btn { background: #6c757d; color: white; }
        .next-btn { background: var(--primary); color: white; flex-grow: 1; display: none; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-app">
    <div class="header">
        <span class="app-title">CBI Production Support</span>
        <span id="status">Loading...</span>
    </div>

    <div id="quiz-content">
        <p id="question-text">Connecting to question bank...</p>
        <div id="options-container"></div>
        
        <div id="hint-box"></div>
        <div id="feedback-box"></div>

        <div class="controls" style="display: flex; justify-content: space-between; gap: 10px; margin-top: 25px;">
    <button class="btn hint-btn" id="back-button" onclick="loadPrevQuestion()" style="background:#6c757d; visibility:hidden;">⬅ Back</button>
    <button class="btn hint-btn" id="hint-button" onclick="showHint()" style="background:#fbc02d; color:#000;">Hint 💡</button>
    <button class="btn next-btn" id="next-button" onclick="loadNextQuestion()" style="background:#004a99; color:white; flex-grow:1; display:none;">Next ➜</button>
</div>

    </div>
</div>

<script>
    let questions = [];
    let currentIndex = 0;
    let score = 0;

    // Load data from JSON
    async function initQuiz() {
        try {
            const response = await fetch('questions.json');
            if (!response.ok) throw new Error("Could not find questions.json");
            questions = await response.json();
            displayQuestion();
        } catch (error) {
            document.getElementById('question-text').innerHTML = 
                `<span style="color:red">Error: ${error.message}</span><br><small>Make sure questions.json is in the same folder and you are viewing through a server (GitHub Pages or VS Code Live Server).</small>`;
        }
    }

    function displayQuestion() {
        const q = questions[currentIndex];
        
        // Update UI
        document.getElementById('status').innerText = `Progress: ${currentIndex + 1} / ${questions.length}`;
        document.getElementById('question-text').innerText = q.question;
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        document.getElementById('hint-box').style.display = "none";
        document.getElementById('feedback-box').style.display = "none";
        document.getElementById('next-button').style.display = "none";
        document.getElementById('hint-button').style.display = "block";

        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => checkAnswer(index);
            container.appendChild(btn);
        });
    }

    function showHint() {
        const hb = document.getElementById('hint-box');
        hb.innerText = "💡 Hint: " + questions[currentIndex].hint;
        hb.style.display = "block";
    }

    function checkAnswer(selectedIndex) {
        const q = questions[currentIndex];
        const fb = document.getElementById('feedback-box');
        const nextBtn = document.getElementById('next-button');
        const btns = document.querySelectorAll('.option-btn');

        fb.style.display = "block";
        
        if (selectedIndex === q.answer) {
            fb.className = "feedback-correct";
            fb.innerHTML = `<strong>Correct! ✅</strong><br>${q.options[selectedIndex].feedback}<br><br><strong>Explanation:</strong> ${q.explanation}`;
            nextBtn.style.display = "block";
            document.getElementById('hint-button').style.display = "none";
            btns.forEach(b => b.disabled = true);
            score++;
        } else {
            fb.className = "feedback-wrong";
            fb.innerHTML = `<strong>Not quite. ❌</strong><br>${q.options[selectedIndex].feedback}`;
        }
    }

    function loadNextQuestion() {
        currentIndex++;
        if (currentIndex < questions.length) {
            displayQuestion();
        } else {
            document.getElementById('quiz-app').innerHTML = `
                <div style="text-align:center; padding: 20px;">
                    <h2 style="color:var(--primary)">Batch Complete! 🎓</h2>
                    <p style="font-size:1.2rem">Final Score: <strong>${score} / ${questions.length}</strong></p>
                    <button class="btn next-btn" style="display:inline-block" onclick="location.reload()">Restart Quiz</button>
                </div>`;
        }
    }

    // Start
    initQuiz();
</script>

</body>
</html>
